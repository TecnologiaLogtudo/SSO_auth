version: "3.8"

services:
  postgres_keycloak:
    image: postgres:16-alpine
    container_name: keycloak_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    build: .
    restart: unless-stopped
    command: start --optimized --verbose
    depends_on:
      postgres_keycloak:
        condition: service_healthy

    environment:
      # Banco
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${DB_PASSWORD:?Database password required}

      # Proxy/Traefik (essencial para Coolify)
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KC_HOSTNAME}      # Definido no Coolify
      KC_HOSTNAME_STRICT: "true"       # Para debug; mude para true em prod
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"

      # Admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Admin password required}

      # Recursos
      KC_LOG_LEVEL: info

    expose:
      - "8080"

    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # Keycloak demora para ficar pronto

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KC_HOSTNAME}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "coolify.serviceName=keycloak"

volumes:
  postgres_data:
